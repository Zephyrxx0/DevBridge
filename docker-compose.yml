services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - repo_cache_data:/app/repo_cache
      - reports_data:/app/reports

  vllm-deep:
    image: rocm/vllm:latest
    user: "${UID}:${GID}"
    ipc: host
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
    ports:
      - "8000:8000"
    volumes:
      - "/app/repo_cache/qwen:/root/.cache/huggingface"
    command: >
      --model Qwen/Qwen2.5-72B-Instruct-AWQ
      --gpu-memory-utilization 0.60
      --max-model-len 48000
      --port 8000

  vllm-fast:
    image: rocm/vllm:latest
    user: "${UID}:${GID}"
    ipc: host
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
    ports:
      - "8001:8001"
    volumes:
      - "/app/repo_cache/gemma:/root/.cache/huggingface"
    command: >
      --model Gemma-4-9B-it
      --gpu-memory-utilization 0.20
      --max-model-len 48000
      --port 8001

volumes:
  repo_cache_data:
  reports_data:
