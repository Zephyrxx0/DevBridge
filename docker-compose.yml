services:
  vllm-deep:
    image: rocm/vllm:latest
    ipc: host
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
    ports:
      - "8000:8000"
    command: >
      --model Qwen/Qwen2.5-72B-Instruct-AWQ
      --gpu-memory-utilization 0.60
      --max-model-len 48000
      --port 8000

  vllm-fast:
    image: rocm/vllm:latest
    ipc: host
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
    ports:
      - "8001:8001"
    command: >
      --model Gemma-4-9B-it
      --gpu-memory-utilization 0.20
      --max-model-len 48000
      --port 8001
